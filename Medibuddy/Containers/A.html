<html>
  <head><title>Medibuddy</title>
    <link rel="stylesheet" href="../style.css">
  <style>
    .button-container{
    justify-content: left;
    margin-top: 100px;
    margin-left: 100px;
    }
    </style>  
  </head>
  <body>
    <div class="heading">
      <h1><img src="../Background_image/medibuddy_logo.png"></h1>
      </div>
    <div class="casing">
      <div class="button-container">
        <a href="Containers/A.html">
          <button class="container"><h2>A</h2></button> <span class="dot dot-active"></span> </a>
      </div>
    </div>
    <input type="number" id="quantity" placeholder="Quantity" min="0" max="100">
    <input type="time" id="time-start">
    <div class="interval-container">
      <input type="number" class="interval-box" palceholder="HH" min="0" max="23">
      <span>:</span>
      <input type="number" class="intercal-box" placeholder="MM" min="0" max="30" step="30" value="0">
    </div>
    <input type="number" class="dose" placeholder="dose" min="0" max="10">
