<html>
<head>
  <title>Medibuddy</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    .main {
      display: flex;
      align-items: flex-end; 
      gap: 30px;

      margin-top: 100px;
      margin-left: 100px;
    }

    p {
      margin: 5px;
    }
  </style>
</head>

<body>
  <div class="heading">
    <h1><img src="../Background_image/medibuddy_logo.png"></h1>
  </div>

  <div class="casing">
    <div class="main">

      <div class="button-container button-container-management">
        <a href="../index.html">
          <button class="container"><h2>A</h2></button>
          <span class="dot dot-active"></span>
        </a>
      </div>

      <div class="controls">
        <input type="number" id="frequency" placeholder="Frequency" min="0" max="100">
        <input type="time" id="time-start"> 

        <div class="interval-container">
          <p>Interval</p>
          <input type="number" class="interval-box" placeholder="HH" min="0" max="23">
          <span>:</span>
          <input type="number" class="interval-box" placeholder="MM" min="0" max="30" step="30">
        </div>

        <input type="number" class="dose" placeholder="Dose" min="0" max="10">

        <button type="submit" class="naviButton">Confirm</button>
        <button type="reset" class="naviButton">Reset</button>
        <a href="../index.html">
          <button type="button" class="naviButton">Back</button>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
