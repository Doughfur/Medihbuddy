<html>
<head><title>Medibuddy</title>
<link rel="stylesheet" href="style.css">
<style>
  body{
    width: 100%;
    box-sizing: border-box;
    overflow-x: hidder;
    }
  .button-container a:active .dot {
    background-color: #ff4d4d; /* Bright Red */
    box-shadow: 0 0 10px #ff4d4d; /* Optional: Makes the dot "glow" red */
    transform: scale(1.2); /* Makes the dot slightly larger when pressed */
    transition: all 0.1s ease; /* Makes the color change smooth */
    }
  .container{
    background-color: #edeef0;
    border: 1px solid black;
    color: white;
    padding: 90px 30px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0px 8px 16px 0 light-blue;
    margin-left: 10px;
    margin-right 10px;
    display: flex;
    box-shadow: 7px 6px #43474c, 14px 12px #b3becc;
    }
  .heading h1 img {
    max-width: 750px;
    height: auto;
    display: block;
    margin: 0 auto;
    }
  .button-container {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 20px 0;
    box-sizing: border-box;
    }
  .button-container a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    }
  .button-container a:hover .dot {
    background-color: #ff4d4d;
    cursor: pointer;
    transform: scale(1.1);
  }
  .dot {
    height: 25px;
    width: 25px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    margin-top: 20px;
    margin-left: 20px;
    transition: background-color 0.3s ease;
    }
  }
  .casing {
    width: 80%
    margin: 30px auto;
    padding: 30px 40px;
    height: 250px;
    background-color: #76abe6;
    background-size: cover;
    background-position: center;
    border-radius: 30px;
    text-align: center;
    }
</style>
</head>
<body>
      <div class="heading">
      <h1><img src="Background_image/medibuddy_logo.png"></h1>
    </div>
    <div class="casing">
      <div class="button-container">
        <a href="Containers/A.html">
          <button class="container"><h2>A</h2></button>
          <span class="dot dot-active"></span>
        </a>
        <a href="Containers/B.html">
          <button class="container"><h2>B</h2></button>
          <span class="dot dot-active"></span>
        </a>
        <a href="Containers/C.html">
          <button class="container"><h2>C</h2></button>
          <span class="dot dot-active"></span>
        </a>
        <a href="Containers/D.html">
          <button class="container"><h2>D</h2></button>
          <span class="dot dot-active"></span>
        </a>
        <a href="Containers/E.html">
          <button class="container"><h2>E</h2></button>
          <span class="dot dot-active"></span>
        </a>
        <a href="Containers/F.html">
          <button class="container"><h2>F</h2></button>
          <span class="dot dot-active"></span>
        </a>
        <a href="Containers/G.html">
          <button class="container"><h2>G</h2></button>
          <span class="dot dot-active"></span>
        </a>
      </div>
    </div>
  </body>
</html>
